<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTPS Server Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glow-text-blue {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.8), 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .glow-text-green {
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.8), 0 0 20px rgba(74, 222, 128, 0.4);
        }

        .btn-glow {
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.8);
            transform: translateY(-2px);
        }

        .stat-icon {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <header class="text-center mt-10 mb-12">
        <h1 class="text-5xl font-bold mb-3 glow-text-blue tracking-wider" id="server-name">GTPS SERVER</h1>
        <p class="text-slate-400 text-lg">Live Server Statistics & Information</p>
        <div class="mt-4 inline-flex items-center px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700">
            <span class="w-3 h-3 rounded-full bg-green-500 mr-2 shadow-[0_0_8px_#22c55e]" id="status-indicator"></span>
            <span class="text-sm font-semibold tracking-wide" id="server-status">Menghubungkan...</span>
        </div>
    </header>

    <main class="w-full max-w-4xl">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass-card rounded-2xl p-6 text-center transform transition duration-300 hover:scale-105 hover:border-sky-500/50">
                <i class="fa-solid fa-users text-3xl mb-3 stat-icon"></i>
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-1">Players Online</h3>
                <p class="text-3xl font-bold glow-text-blue" id="players-online"><span class="loader"></span></p>
            </div>

            <div class="glass-card rounded-2xl p-6 text-center transform transition duration-300 hover:scale-105 hover:border-sky-500/50">
                <i class="fa-solid fa-globe text-3xl mb-3 stat-icon"></i>
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-1">Worlds Active</h3>
                <p class="text-3xl font-bold glow-text-blue" id="worlds-active"><span class="loader"></span></p>
            </div>

            <div class="glass-card rounded-2xl p-6 text-center transform transition duration-300 hover:scale-105 hover:border-sky-500/50">
                <i class="fa-solid fa-memory text-3xl mb-3 stat-icon"></i>
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-1">RAM Usage</h3>
                <p class="text-3xl font-bold glow-text-blue" id="ram-usage"><span class="loader"></span></p>
            </div>

            <div class="glass-card rounded-2xl p-6 text-center transform transition duration-300 hover:scale-105 hover:border-sky-500/50">
                <i class="fa-solid fa-server text-3xl mb-3 stat-icon"></i>
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-1">Server Tier</h3>
                <p class="text-3xl font-bold glow-text-blue" id="server-tier"><span class="loader"></span></p>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-8 md:p-12 text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="flex-1">
                <h2 class="text-2xl font-bold mb-4 text-white">Informasi Server</h2>
                <ul class="text-slate-300 space-y-3 mb-6">
                    <li class="flex items-center justify-center md:justify-start">
                        <i class="fa-solid fa-check text-green-400 mr-3"></i> 24/7 Uptime dari GTPS Cloud
                    </li>
                    <li class="flex items-center justify-center md:justify-start">
                        <i class="fa-solid fa-check text-green-400 mr-3"></i> Komunitas yang Aktif & Solid
                    </li>
                    <li class="flex items-center justify-center md:justify-start">
                        <i class="fa-solid fa-check text-green-400 mr-3"></i> Minim Lag & Performa Stabil
                    </li>
                </ul>
            </div>
            
            <div class="flex-none w-full md:w-auto">
                <a href="https://dash.gtps.cloud/how-to-play/3587" target="_blank" class="block w-full text-center bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-400 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl btn-glow text-lg uppercase tracking-wide">
                    <i class="fa-solid fa-download mr-2"></i> Download Host
                </a>
            </div>
        </div>

    </main>

    <footer class="mt-16 text-slate-500 text-sm pb-8">
        &copy; <script>document.write(new Date().getFullYear())</script> GTPS Server. Powered by GTPS Cloud.
    </footer>

    <script>
        const API_URL = 'https://api.gtps.cloud/api/server/public/3587';

        const tierNames = {
            1: 'Bronze',
            2: 'Gold',
            3: 'Diamond',
            4: 'Emerald'
        };

        async function fetchServerStats() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Jaringan bermasalah');
                
                const result = await response.json();
                
                // GTPS Cloud API usually wraps data inside a "data" object
                const data = result.data || result;

                // Update DOM elements with fallback strings if undefined
                document.getElementById('server-name').innerText = data.name || data.serverName || 'GTPS SERVER';
                document.getElementById('players-online').innerText = data.players || data.online || '0';
                document.getElementById('worlds-active').innerText = data.worlds || data.worlds_active || '0';
                document.getElementById('ram-usage').innerText = data.ram || data.memory || '0 MB';
                
                // Update Tier using mapping
                const rawTier = data.tier;
                document.getElementById('server-tier').innerText = tierNames[rawTier] || rawTier || 'Free';
                
                // Update Status Indicator
                const statusText = document.getElementById('server-status');
                const statusIndicator = document.getElementById('status-indicator');
                
                statusText.innerText = 'Online';
                statusIndicator.classList.remove('bg-red-500', 'shadow-[0_0_8px_#ef4444]');
                statusIndicator.classList.add('bg-green-500', 'shadow-[0_0_8px_#22c55e]');

            } catch (error) {
                console.error('Gagal mengambil data dari API:', error);
                
                // Set to offline state
                document.getElementById('server-status').innerText = 'Offline';
                const statusIndicator = document.getElementById('status-indicator');
                statusIndicator.classList.remove('bg-green-500', 'shadow-[0_0_8px_#22c55e]');
                statusIndicator.classList.add('bg-red-500', 'shadow-[0_0_8px_#ef4444]');

                // Clear loaders
                document.getElementById('players-online').innerText = '-';
                document.getElementById('worlds-active').innerText = '-';
                document.getElementById('ram-usage').innerText = '-';
                document.getElementById('server-tier').innerText = '-';
            }
        }

        // Fetch immediately on load
        fetchServerStats();

        // Refresh data every 15 seconds
        setInterval(fetchServerStats, 15000);
    </script>
</body>
</html>
